name: Mirror services to standalone repos

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # All mirrors live under the Concertable org (resolved in POLYREPO_COMPLETION.md Phase 0).
          # Service mirrors:
          - prefix: api/Concertable.B2B
            repo: Concertable/concertable-b2b
          - prefix: api/Concertable.Customer
            repo: Concertable/concertable-customer
          - prefix: api/Concertable.Auth
            repo: Concertable/concertable-auth
          - prefix: api/Concertable.Payment
            repo: Concertable/concertable-payment
          - prefix: api/Concertable.Search
            repo: Concertable/concertable-search
          # Shared-platform mirror. Covers api/Shared (Kernel, Contracts, Shared.*, Seed.*); the other
          # shared infra libs (Messaging, ServiceDefaults, DataAccess, AppHost.Shared, Auth.Contracts)
          # are separate top-level folders — finer splits deferred.
          - prefix: api/Shared
            repo: Concertable/concertable-shared

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Split ${{ matrix.prefix }} into its own history
        run: git subtree split --prefix=${{ matrix.prefix }} -b mirror-split

      - name: Force-push to ${{ matrix.repo }}
        run: |
          git push --force \
            "https://x-access-token:${{ secrets.MIRROR_PAT }}@github.com/${{ matrix.repo }}.git" \
            mirror-split:master
