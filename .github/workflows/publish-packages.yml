name: Publish packages

# Packaging rails for SERVICE_BUILD_SEPARATION: pack the publishable Concertable.*
# projects with a MinVer-derived version and push them to the org's GitHub Packages
# NuGet feed, then prove a fresh consumer can restore the full published closure from the feed.
#
# What publishes is gated by ONE thing: <IsPackable>true</IsPackable> on a project. The
# pack step packs every IsPackable project in the solution, so opting a package in is a
# one-line csproj edit with no workflow change. The BUILD1 invariant: every packable lib's
# own ProjectReferences must also be packable, else its package declares a feed-absent
# Concertable.* dependency and restore fails NU1101. The verify-restore job below guards this
# by restoring the entire published closure (every Concertable.* package) into a fresh consumer.
#
# Versioning is lockstep (one MinVer line for every package) while this is one repo; it
# becomes independent per-repo versioning for free once a service splits out. The push
# trigger is the coarse backend boundary 'api/**' — deliberately NOT a per-package folder
# list, which would have to track IsPackable and would silently mis-publish the moment it
# drifted. 'api/**' only avoids re-running on frontend/docs-only pushes; IsPackable still
# decides what actually ships.

on:
  push:
    branches:
      - master
    paths:
      - 'api/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FEED: https://nuget.pkg.github.com/Concertable/index.json

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # MinVer derives the version from git history + tags

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Pack publishable projects
        run: dotnet pack api/Concertable.slnx --configuration Release --output ${{ runner.temp }}/nupkgs

      - name: List packages
        run: ls -l ${{ runner.temp }}/nupkgs

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push "${{ runner.temp }}/nupkgs/*.nupkg" \
            --source "$FEED" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate

  verify-restore:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore the full published closure from the feed (fresh consumer)
        # A fresh consumer referencing EVERY published Concertable.* package, restored from the
        # feed alone. If any package declares a feed-absent Concertable.* dependency (the BUILD1
        # trap: a packable lib that ProjectReferences a non-packable one) this restore fails
        # NU1101. Floating '*-*' takes the version just pushed by the publish job; nuget.org is
        # inherited (no <clear/>) so the packages' external dependencies resolve normally.
        # Extend the list when a later phase opts a new package in.
        run: |
          mkdir consumer && cd consumer
          cat > nuget.config <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <add key="github" value="$FEED" />
            </packageSources>
            <packageSourceCredentials>
              <github>
                <add key="Username" value="Concertable" />
                <add key="ClearTextPassword" value="${{ secrets.GITHUB_TOKEN }}" />
              </github>
            </packageSourceCredentials>
          </configuration>
          EOF
          cat > consumer.csproj <<'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>net10.0</TargetFramework>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="Concertable.Kernel" Version="*-*" />
              <PackageReference Include="Concertable.Contracts" Version="*-*" />
              <PackageReference Include="Concertable.Auth.Contracts" Version="*-*" />
              <PackageReference Include="Concertable.Messaging.Contracts" Version="*-*" />
              <PackageReference Include="Concertable.Messaging.Domain" Version="*-*" />
              <PackageReference Include="Concertable.Messaging.Application" Version="*-*" />
              <PackageReference Include="Concertable.Messaging.Infrastructure" Version="*-*" />
              <PackageReference Include="Concertable.Messaging.AzureServiceBus" Version="*-*" />
              <PackageReference Include="Concertable.DataAccess.Application" Version="*-*" />
              <PackageReference Include="Concertable.DataAccess.Infrastructure" Version="*-*" />
              <PackageReference Include="Concertable.ServiceDefaults" Version="*-*" />
              <PackageReference Include="Concertable.Shared.Blob.Application" Version="*-*" />
              <PackageReference Include="Concertable.Shared.Blob.Infrastructure" Version="*-*" />
              <PackageReference Include="Concertable.Shared.Email.Application" Version="*-*" />
              <PackageReference Include="Concertable.Shared.Email.Infrastructure" Version="*-*" />
              <PackageReference Include="Concertable.Shared.Geocoding.Application" Version="*-*" />
              <PackageReference Include="Concertable.Shared.Geocoding.Infrastructure" Version="*-*" />
              <PackageReference Include="Concertable.Shared.Imaging.Application" Version="*-*" />
              <PackageReference Include="Concertable.Shared.Imaging.Infrastructure" Version="*-*" />
              <PackageReference Include="Concertable.Shared.Notification.Infrastructure" Version="*-*" />
              <PackageReference Include="Concertable.Shared.Pdf.Application" Version="*-*" />
              <PackageReference Include="Concertable.Shared.Pdf.Infrastructure" Version="*-*" />
              <PackageReference Include="Concertable.Seed.Shared" Version="*-*" />
              <PackageReference Include="Concertable.Seed.Identity" Version="*-*" />
              <PackageReference Include="Concertable.Shared.Api" Version="*-*" />
              <PackageReference Include="Concertable.Testing" Version="*-*" />
              <PackageReference Include="Concertable.Testing.Integration" Version="*-*" />
              <PackageReference Include="Concertable.B2B.Tenant.Contracts" Version="*-*" />
              <PackageReference Include="Concertable.Payment.Contracts" Version="*-*" />
              <PackageReference Include="Concertable.Payment.Client" Version="*-*" />
            </ItemGroup>
          </Project>
          EOF
          dotnet restore
          echo "Restored the full published Concertable.* closure from GitHub Packages."
