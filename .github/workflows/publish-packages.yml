name: Publish packages

# Packaging rails for SERVICE_BUILD_SEPARATION: pack the publishable Concertable.*
# projects with a MinVer-derived version and push them to the org's GitHub Packages
# NuGet feed, then prove a fresh consumer can restore the full published closure from the feed.
#
# What publishes is gated by ONE thing: <IsPackable>true</IsPackable> on a project. The
# pack step packs every IsPackable project in the solution, so opting a package in is a
# one-line csproj edit with no workflow change. The BUILD1 invariant: every packable lib's
# own ProjectReferences must also be packable, else its package declares a feed-absent
# Concertable.* dependency and restore fails NU1101. The verify-restore job below guards this
# by restoring the entire published closure (every Concertable.* package) into a fresh consumer.
#
# Versioning is lockstep (one MinVer line for every package) while this is one repo; it
# becomes independent per-repo versioning for free once a service splits out. The push
# trigger is the coarse backend boundary 'api/**' — deliberately NOT a per-package folder
# list, which would have to track IsPackable and would silently mis-publish the moment it
# drifted. 'api/**' only avoids re-running on frontend/docs-only pushes; IsPackable still
# decides what actually ships.

on:
  push:
    branches:
      - master
    paths:
      - 'api/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FEED: https://nuget.pkg.github.com/Concertable/index.json

jobs:
  publish:
    runs-on: ubuntu-latest
    # `dotnet pack` restores the whole solution, including Concertable.Auth — which since Phase 2b
    # consumes the shared platform as packages from the feed. Without the feed credential Auth's
    # restore 401s (NU1301) and pack fails. The repo GITHUB_TOKEN reads the org packages this repo
    # published; workflow-level `packages: write` already covers the read.
    env:
      GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # MinVer derives the version from git history + tags

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Pack publishable projects
        run: dotnet pack api/Concertable.slnx --configuration Release --output ${{ runner.temp }}/nupkgs

      - name: List packages
        run: ls -l ${{ runner.temp }}/nupkgs

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push "${{ runner.temp }}/nupkgs/*.nupkg" \
            --source "$FEED" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate

  verify-restore:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore the full published closure from the feed (fresh consumer)
        # A fresh consumer referencing EVERY published Concertable.* package, restored from the
        # feed alone. If any package declares a feed-absent Concertable.* dependency (the BUILD1
        # trap: a packable lib that ProjectReferences a non-packable one) this restore fails
        # NU1101. Floating '*-*' takes the version just pushed by the publish job; nuget.org is
        # inherited (no <clear/>) so the packages' external dependencies resolve normally.
        #
        # The package list is GENERATED from the <IsPackable>true</IsPackable> projects — the same
        # single source of truth that drives `dotnet pack` — so it can't drift from what publishes:
        # opting a package in (the one-line csproj edit) automatically adds it to this check, with no
        # second hand-maintained list to forget. Relies on every packable project's PackageId being
        # its project-file name (none override PackageId/AssemblyName); the empty-list guard fails
        # loudly if the grep ever stops matching.
        run: |
          mkdir "$RUNNER_TEMP/consumer" && cd "$RUNNER_TEMP/consumer"
          cat > nuget.config <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <add key="github" value="$FEED" />
            </packageSources>
            <packageSourceCredentials>
              <github>
                <add key="Username" value="Concertable" />
                <add key="ClearTextPassword" value="${{ secrets.GITHUB_TOKEN }}" />
              </github>
            </packageSourceCredentials>
          </configuration>
          EOF
          packable=$(grep -rl '<IsPackable>true</IsPackable>' "$GITHUB_WORKSPACE/api" --include='*.csproj' \
            | xargs -n1 basename | sed 's/\.csproj$//' | sort -u || true)
          test -n "$packable" || { echo "No <IsPackable>true</IsPackable> projects found — refusing to pass"; exit 1; }
          echo "Published packages to verify (derived from IsPackable projects):"
          echo "$packable"
          {
            echo '<Project Sdk="Microsoft.NET.Sdk">'
            echo '  <PropertyGroup><TargetFramework>net10.0</TargetFramework></PropertyGroup>'
            echo '  <ItemGroup>'
            echo "$packable" | sed 's#.*#    <PackageReference Include="&" Version="*-*" />#'
            echo '  </ItemGroup>'
            echo '</Project>'
          } > consumer.csproj
          dotnet restore
          echo "Restored the full published Concertable.* closure ($(echo "$packable" | wc -l) packages) from GitHub Packages."
