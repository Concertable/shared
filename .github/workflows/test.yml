name: Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  merge_group:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    env:
      # Feed credential: the slnx build restores Auth's and Payment's feed packages; the repo token reads the org's own packages.
      GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build solution
        run: dotnet build api/Concertable.slnx --configuration Release

  carve-auth:
    # Gate: Concertable.Auth must build standalone from its own package closure — a ProjectReference
    # escaping api/Concertable.Auth/ fails here (project-not-found) instead of silently at a repo split.
    # Use `git archive`, not `git subtree split`: the split rewrites the folder's whole history and is
    # far too slow for a gate; archive extracts the tracked tree at HEAD instantly (no fetch-depth: 0).
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read

    env:
      GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Carve api/Concertable.Auth into a standalone tree
        run: |
          mkdir -p "$RUNNER_TEMP/carve"
          git archive HEAD:api/Concertable.Auth | tar -x -C "$RUNNER_TEMP/carve"
          echo "Carved tree (only api/Concertable.Auth tracked files):"
          ls -la "$RUNNER_TEMP/carve"

      - name: Restore + build the carved Auth from the feed (packages only)
        working-directory: ${{ runner.temp }}/carve
        run: dotnet build Concertable.Auth.csproj --configuration Release

  carve-payment:
    # Gate: Concertable.Payment's deployable closure must build standalone from its own package
    # closure — a ProjectReference escaping api/Concertable.Payment/ fails here (project-not-found)
    # instead of silently at a repo split. Same `git archive` technique as carve-auth.
    # Build a closure-only solution, NOT the .slnx: the slnx also carries AppHost.Extensions and the
    # E2ETests.Helpers harness, which reference cross-folder projects (Concertable.AppHost.Shared,
    # Concertable.E2ETests) that are absent from the carve and exempt by design (composition / E2E
    # harness layers). The solution lists every package-clean project so each is built directly.
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read

    env:
      GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Carve api/Concertable.Payment into a standalone tree
        run: |
          mkdir -p "$RUNNER_TEMP/carve"
          git archive HEAD:api/Concertable.Payment | tar -x -C "$RUNNER_TEMP/carve"
          echo "Carved tree (only api/Concertable.Payment tracked files):"
          ls -la "$RUNNER_TEMP/carve"

      - name: Restore + build the carved Payment deployable closure from the feed (packages only)
        working-directory: ${{ runner.temp }}/carve
        # One closure-only solution → a single feed restore, and every package-clean project is built
        # directly, so a future ref-removal can't orphan one from the gate (e.g. Api, reached only via Web).
        # MinVerSkip: the carved tree has no .git, so MinVer can't derive a version — irrelevant for a build-only gate.
        run: |
          dotnet new sln --name CarvePayment --format slnx
          dotnet sln CarvePayment.slnx add \
            Concertable.Payment.Web/Concertable.Payment.Web.csproj \
            Concertable.Payment.Workers/Concertable.Payment.Workers.csproj \
            Concertable.Payment.Client/Concertable.Payment.Client.csproj \
            Concertable.Payment.Api/Concertable.Payment.Api.csproj \
            Concertable.Payment.Application/Concertable.Payment.Application.csproj \
            Concertable.Payment.Infrastructure/Concertable.Payment.Infrastructure.csproj \
            Concertable.Payment.Domain/Concertable.Payment.Domain.csproj \
            Concertable.Payment.Contracts/Concertable.Payment.Contracts.csproj \
            Seed/Concertable.Payment.Seed/Concertable.Payment.Seed.csproj
          dotnet build CarvePayment.slnx --configuration Release -p:MinVerSkip=true

  unit-tests:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read

    env:
      # Payment's test graph — and B2B/Customer's via Payment.Client/Contracts — restores feed packages now; 401 without this.
      GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    strategy:
      matrix:
        project:
          - api/Concertable.B2B/Modules/Concert/Tests/Concertable.B2B.Concert.UnitTests/Concertable.B2B.Concert.UnitTests.csproj
          - api/Concertable.B2B/Modules/Contract/Tests/Concertable.B2B.Contract.UnitTests/Concertable.B2B.Contract.UnitTests.csproj
          - api/Concertable.B2B/Modules/Tenant/Tests/Concertable.B2B.Tenant.UnitTests/Concertable.B2B.Tenant.UnitTests.csproj
          - api/Concertable.B2B/Tests/Concertable.B2B.Workers.UnitTests/Concertable.B2B.Workers.UnitTests.csproj
          - api/Concertable.Customer/Modules/Concert/Tests/Concertable.Customer.Concert.UnitTests/Concertable.Customer.Concert.UnitTests.csproj
          - api/Concertable.Customer/Modules/Review/Tests/Concertable.Customer.Review.UnitTests/Concertable.Customer.Review.UnitTests.csproj
          - api/Concertable.Customer/Modules/Ticket/Tests/Concertable.Customer.Ticket.UnitTests/Concertable.Customer.Ticket.UnitTests.csproj
          - api/Concertable.Customer/Modules/User/Tests/Concertable.Customer.User.UnitTests/Concertable.Customer.User.UnitTests.csproj
          - api/Concertable.Messaging/Tests/Concertable.Messaging.UnitTests/Concertable.Messaging.UnitTests.csproj
          - api/Concertable.Messaging/Tests/Concertable.Messaging.AzureServiceBus.UnitTests/Concertable.Messaging.AzureServiceBus.UnitTests.csproj
          - api/Concertable.Payment/Tests/Concertable.Payment.UnitTests/Concertable.Payment.UnitTests.csproj
          - api/Concertable.Search/Tests/Concertable.Search.UnitTests/Concertable.Search.UnitTests.csproj
          - api/Shared/Tests/Concertable.Kernel.UnitTests/Concertable.Kernel.UnitTests.csproj

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Run ${{ matrix.project }}
        run: dotnet test ${{ matrix.project }} --configuration Release

  integration-tests:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read

    env:
      # B2B/Customer integration tests restore Payment.Client/Contracts, now feed packages; 401 without this.
      GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    strategy:
      matrix:
        project:
          - api/Concertable.B2B/Modules/Artist/Tests/Concertable.B2B.Artist.IntegrationTests/Concertable.B2B.Artist.IntegrationTests.csproj
          - api/Concertable.B2B/Modules/Concert/Tests/Concertable.B2B.Concert.IntegrationTests/Concertable.B2B.Concert.IntegrationTests.csproj
          - api/Concertable.B2B/Modules/Tenant/Tests/Concertable.B2B.Tenant.IntegrationTests/Concertable.B2B.Tenant.IntegrationTests.csproj
          - api/Concertable.B2B/Modules/User/Tests/Concertable.B2B.User.IntegrationTests/Concertable.B2B.User.IntegrationTests.csproj
          - api/Concertable.B2B/Modules/Venue/Tests/Concertable.B2B.Venue.IntegrationTests/Concertable.B2B.Venue.IntegrationTests.csproj
          - api/Concertable.Customer/Modules/Concert/Tests/Concertable.Customer.Concert.IntegrationTests/Concertable.Customer.Concert.IntegrationTests.csproj
          - api/Concertable.Customer/Modules/Review/Tests/Concertable.Customer.Review.IntegrationTests/Concertable.Customer.Review.IntegrationTests.csproj
          - api/Concertable.Customer/Modules/Ticket/Tests/Concertable.Customer.Ticket.IntegrationTests/Concertable.Customer.Ticket.IntegrationTests.csproj
          - api/Concertable.Customer/Modules/User/Tests/Concertable.Customer.User.IntegrationTests/Concertable.Customer.User.IntegrationTests.csproj
          - api/Concertable.Search/Tests/Concertable.Search.IntegrationTests/Concertable.Search.IntegrationTests.csproj

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Run ${{ matrix.project }}
        run: dotnet test ${{ matrix.project }} --configuration Release

  e2e-api-tests:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'merge_group'

    permissions:
      contents: read
      packages: read

    env:
      # Required: dotnet test restores the AppHost + Payment.Client/Contracts, which pull Auth's and
      # Payment's feed packages. Drop this and the merge-queue gate dies at restore (401) before any scenario runs.
      GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GoogleApiKey: ${{ secrets.GOOGLE_API_KEY }}
      Stripe__SecretKey: ${{ secrets.STRIPE_SECRET_KEY }}
      ServiceAuth__B2BClientSecret: ${{ secrets.SERVICE_AUTH_B2B_CLIENT_SECRET }}
      ServiceAuth__CustomerClientSecret: ${{ secrets.SERVICE_AUTH_CUSTOMER_CLIENT_SECRET }}
      ServiceAuth__AuthClientSecret: ${{ secrets.SERVICE_AUTH_AUTH_CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Provision HTTPS dev certificate
        run: |
          dotnet dev-certs https --trust || true  # Linux trust exits 4, but the cert is still generated
          echo "SSL_CERT_DIR=$HOME/.aspnet/dev-certs/trust:/etc/ssl/certs:/usr/lib/ssl/certs" >> "$GITHUB_ENV"

      - name: Install Stripe CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          url=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" https://api.github.com/repos/stripe/stripe-cli/releases/latest | grep -oE 'https://[^"]+_linux_x86_64\.tar\.gz' | head -1)
          test -n "$url" || { echo "Stripe CLI linux_x86_64 asset not found"; exit 1; }
          curl -fsSL "$url" -o /tmp/stripe.tar.gz
          sudo tar -xzf /tmp/stripe.tar.gz -C /usr/local/bin stripe
          stripe version

      - name: Install Azure Functions Core Tools
        # The B2B Workers host is an Azure Functions (v4) app; Aspire launches it via `dotnet run`,
        # which shells out to the `func` Core Tools. Without them the host never binds, so the
        # ConcertFinished* tests get "Connection refused (localhost:7078)" when triggering the timer.
        run: |
          npm install -g azure-functions-core-tools@4 --unsafe-perm true
          func --version

      - name: Run B2B API E2E tests
        run: dotnet test api/Concertable.B2B/Tests/E2ETests/Concertable.B2B.E2ETests/Concertable.B2B.E2ETests.csproj --configuration Release --settings api/Concertable.runsettings

      - name: Run Customer API E2E tests
        run: dotnet test api/Concertable.Customer/Tests/E2ETests/Concertable.Customer.E2ETests/Concertable.Customer.E2ETests.csproj --configuration Release --settings api/Concertable.runsettings

      - name: Upload E2E diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-api-diagnostics
          path: '**/e2e-diagnostics.log'
          if-no-files-found: ignore

  e2e-ui-tests:
    runs-on: ubuntu-latest
    needs: [build, e2e-api-tests]
    if: github.event_name == 'merge_group'

    permissions:
      contents: read
      packages: read

    env:
      # Required: building the UI E2E projects restores the AppHost + Payment.Client/Contracts → Auth's and Payment's feed packages (see e2e-api-tests).
      GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GoogleApiKey: ${{ secrets.GOOGLE_API_KEY }}
      Stripe__SecretKey: ${{ secrets.STRIPE_SECRET_KEY }}
      ServiceAuth__B2BClientSecret: ${{ secrets.SERVICE_AUTH_B2B_CLIENT_SECRET }}
      ServiceAuth__CustomerClientSecret: ${{ secrets.SERVICE_AUTH_CUSTOMER_CLIENT_SECRET }}
      ServiceAuth__AuthClientSecret: ${{ secrets.SERVICE_AUTH_AUTH_CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Provision HTTPS dev certificate
        run: |
          dotnet dev-certs https --trust || true  # Linux trust exits 4, but the cert is still generated
          echo "SSL_CERT_DIR=$HOME/.aspnet/dev-certs/trust:/etc/ssl/certs:/usr/lib/ssl/certs" >> "$GITHUB_ENV"

      - name: Install Stripe CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          url=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" https://api.github.com/repos/stripe/stripe-cli/releases/latest | grep -oE 'https://[^"]+_linux_x86_64\.tar\.gz' | head -1)
          test -n "$url" || { echo "Stripe CLI linux_x86_64 asset not found"; exit 1; }
          curl -fsSL "$url" -o /tmp/stripe.tar.gz
          sudo tar -xzf /tmp/stripe.tar.gz -C /usr/local/bin stripe
          stripe version

      - name: Install Azure Functions Core Tools
        # Same as the API E2E job: the full AppHost boots the B2B Workers Azure Functions host,
        # which needs the `func` Core Tools on PATH to launch.
        run: |
          npm install -g azure-functions-core-tools@4 --unsafe-perm true
          func --version

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install web SPA dependencies
        # The UI E2E AppHost serves the venue/artist/business/customer SPAs via `npm run dev` (Vite).
        # They live in the app/ npm workspace; node_modules is gitignored, so without this the dev
        # servers never start and every scenario fails at warm-up with ERR_CONNECTION_REFUSED.
        working-directory: app
        run: npm ci

      - name: Build B2B UI E2E tests
        run: dotnet build api/Concertable.B2B/Tests/E2ETests/Concertable.B2B.E2ETests.Ui/Concertable.B2B.E2ETests.Ui.csproj --configuration Release

      - name: Build Customer UI E2E tests
        run: dotnet build api/Concertable.Customer/Tests/E2ETests/Concertable.Customer.E2ETests.Ui/Concertable.Customer.E2ETests.Ui.csproj --configuration Release

      - name: Install Playwright browsers
        run: pwsh api/Concertable.B2B/Tests/E2ETests/Concertable.B2B.E2ETests.Ui/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run B2B UI E2E tests
        run: dotnet test api/Concertable.B2B/Tests/E2ETests/Concertable.B2B.E2ETests.Ui/Concertable.B2B.E2ETests.Ui.csproj --configuration Release --no-build --settings api/Concertable.runsettings

      - name: Run Customer UI E2E tests
        run: dotnet test api/Concertable.Customer/Tests/E2ETests/Concertable.Customer.E2ETests.Ui/Concertable.Customer.E2ETests.Ui.csproj --configuration Release --no-build --settings api/Concertable.runsettings

      - name: Upload E2E diagnostics
        # Server logs + Playwright traces/screenshots for diagnosing a UI failure. Failure-only:
        # the trace bundle is large (~hundreds of MB), so don't upload it on green runs.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-ui-diagnostics
          path: |
            **/e2e-diagnostics.log
            **/playwright-traces/**
            **/playwright-failures/**
          if-no-files-found: ignore
